spring.application.name=webshop-auth-group7
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=${PORT:9000}
server.forward-headers-strategy=framework
spring.datasource.url=${RENDER_URL}
spring.datasource.username=${RENDER_USER}
spring.datasource.password=${RENDER_PWD}
app.jwt.public-key=${JWT_PUBLIC_KEY:}
app.jwt.private-key=${JWT_PRIVATE_KEY:}
spring.datasource.driver-class-name=org.postgresql.Driver
app.jwt.issuer=https://auth-server-group7.onrender.com
app.jwt.expiration-minutes=60
app.jwt.key-id=webshop-auth-key-1