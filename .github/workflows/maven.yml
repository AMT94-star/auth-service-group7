name: Maven Build

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

jobs:
  build:
    name: Maven Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: 21

      - name: Build with Maven
        run: mvn clean verify